name: Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2025-vs2026
    strategy:
      fail-fast: false
      matrix:
        platform: [Win32, x64]

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Strip builtin-baseline from vcpkg.json
        # Local builds (VS2026-bundled vcpkg) require a baseline for manifest
        # mode. The runner's standalone vcpkg doesn't — and pinning to a
        # specific commit on CI just creates "runner doesn't have that SHA"
        # drift forever. So we keep the baseline in vcpkg.json for local
        # dev and strip it here. The change is to the runner's ephemeral
        # checkout only; never committed.
        run: (Get-Content vcpkg.json) | Where-Object { $_ -notmatch '"builtin-baseline"' } | Set-Content vcpkg.json

      - name: Integrate vcpkg with MSBuild
        run: vcpkg integrate install

      - name: Build S3DDriver.sln
        run: msbuild S3DDriver.sln /p:Configuration=Release /p:Platform=${{ matrix.platform }} /m /nologo /verbosity:minimal
